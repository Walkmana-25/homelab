---
- name: Deploy Argo CD
  hosts: server[0] # Usually run against the first server node
  become: true
  vars:
    argocd_namespace: argocd
    argocd_chart_version: 7.7.1 # You can update this to the latest version
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

  tasks:
    - name: Install kubernetes Python library
      ansible.builtin.apt:
        name: python3-kubernetes
        state: present

    - name: Download Helm installation script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
        dest: /tmp/get_helm.sh
        mode: '0700'

    - name: Execute Helm installation script
      ansible.builtin.command: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Create argocd namespace
      kubernetes.core.k8s:
        name: "{{ argocd_namespace }}"
        kind: Namespace
        state: present
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Add Argo CD Helm repository
      kubernetes.core.helm_repository:
        name: argo
        repo_url: "https://argoproj.github.io/argo-helm"

    - name: Install Argo CD via Helm
      kubernetes.core.helm:
        name: argocd
        chart_ref: argo/argo-cd
        release_namespace: "{{ argocd_namespace }}"
        chart_version: "{{ argocd_chart_version }}"
        kubeconfig: "{{ kubeconfig_path }}"
        wait: true
        values:
          server:
            extraArgs:
              - --insecure # For initial setup without TLS certificates
          configs:
            params:
              timeout.reconciliation: 3600s  # 60 minutes (use webhook for faster updates)

    - name: Deploy ArgoCD infrastructure application
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../argocd/k3s/application-infrastructure.yaml"
        kubeconfig: "{{ kubeconfig_path }}"

    - name: Deploy ArgoCD application application
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../argocd/k3s/application-application.yaml"
        kubeconfig: "{{ kubeconfig_path }}"
