---
- name: Fetch kubeconfig from k3s controller
  hosts: server[0]  # Run against the first server node (k3s controller)
  become: true
  vars:
    kubeconfig_source: /etc/rancher/k3s/k3s.yaml
    kubeconfig_dest: /home/ubuntu/.kube/config

  tasks:
    - name: Ensure .kube directory exists
      ansible.builtin.file:
        path: ~/.kube
        state: directory
        mode: '0700'
      delegate_to: localhost
      run_once: true

    - name: Fetch kubeconfig from k3s controller
      ansible.builtin.fetch:
        src: "{{ kubeconfig_source }}"
        dest: "{{ kubeconfig_dest }}"
        flat: true
        mode: '0600'

    - name: Update kubeconfig server address (optional)
      ansible.builtin.replace:
        path: "{{ kubeconfig_dest }}"
        regexp: '127\.0\.0\.1'
        replace: "{{ api_endpoint }}"
      delegate_to: localhost
      run_once: true
