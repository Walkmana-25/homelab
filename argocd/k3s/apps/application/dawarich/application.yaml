---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dawarich-app
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.cogitri.dev
    chart: dawarich
    targetRevision: 2.2.3
    helm:
      values: |
        dawarich:
          replicaCount: 1
          hosts:
            - timeline.lapis-dev.work
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        persistence:
          public:
            enabled: true
            size: 10Gi
            accessMode: ReadWriteMany
          watched:
            enabled: true
            size: 10Gi
            accessMode: ReadWriteMany
          storage:
            enabled: true
            size: 5Gi
            accessMode: ReadWriteMany
        postgresql:
          host: dawarich-postgresql
          port: 5432
          auth:
            database: dawarich
            username: dawarich
            password: changeme
        ingress:
          enabled: true
          className: nginx
          hosts:
            - host: timeline.lapis-dev.work
              paths:
                - path: /
                  pathType: Prefix
  destination:
    server: https://kubernetes.default.svc
    namespace: dawarich-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
