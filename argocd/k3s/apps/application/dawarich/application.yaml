---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dawarich
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.cogitri.dev
    chart: dawarich
    targetRevision: 2.2.3
    helm:
      values: |
        image:
          repository: docker.io/freikin/dawarich
          pullPolicy: IfNotPresent

        dawarich:
          replicaCount: 1
          hosts:
            - timeline.lapis-dev.work
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi

        sidekiq:
          replicaCount: 1
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

        env:
          railsEnv: "production"
          railsLogToStdout: "true"
          applicationProtocol: "http"
          timeZone: "Asia/Tokyo"
          minMinutesSpentInCity: "60"
          backgroundProcessingConcurrency: "5"

        ingress:
          enabled: true
          className: cloudflare-tunnel
          hosts:
            - host: timeline.lapis-dev.work
              paths:
                - path: /
                  pathType: Prefix

        persistence:
          public:
            enabled: true
            accessMode: ReadWriteMany
            storageClass: nfs
            size: 1Gi
          watched:
            enabled: true
            accessMode: ReadWriteMany
            storageClass: nfs
            size: 1Gi
          storage:
            enabled: true
            accessMode: ReadWriteMany
            storageClass: nfs
            size: 5Gi

        redis:
          enabled: true
          auth:
            redisPassword: changeme

        # PostgreSQL (CloudNativePG - deployed via dawarich-postgres in the same namespace)
        postgresql:
          host: dawarich-postgres-rw
          port: 5432
          auth:
            database: dawarich
            username: dawarich
            password: dawarich

  destination:
    server: https://kubernetes.default.svc
    namespace: dawarich
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
