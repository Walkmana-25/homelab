---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich
  namespace: dawarich
  labels:
    app: dawarich
    app.kubernetes.io/name: dawarich
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dawarich
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app: dawarich
        app.kubernetes.io/name: dawarich
        app.kubernetes.io/component: web
    spec:
      volumes:
        - name: public
          persistentVolumeClaim:
            claimName: dawarich-public
        - name: watched
          persistentVolumeClaim:
            claimName: dawarich-watched
      containers:
        - name: dawarich
          image: freikin/dawarich:0.16.4
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: RAILS_ENV
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: RAILS_ENV
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: REDIS_URL
            - name: RAILS_SECRET_KEY_BASE
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: RAILS_SECRET_KEY_BASE
            - name: APPLICATION_HOST
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: APPLICATION_HOST
            - name: TIME_ZONE
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: TIME_ZONE
          volumeMounts:
            - name: public
              mountPath: /var/app/public
            - name: watched
              mountPath: /var/app/tmp/imports/watched
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dawarich-sidekiq
  namespace: dawarich
  labels:
    app: dawarich
    app.kubernetes.io/name: dawarich
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dawarich
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app: dawarich
        app.kubernetes.io/name: dawarich
        app.kubernetes.io/component: worker
    spec:
      volumes:
        - name: public
          persistentVolumeClaim:
            claimName: dawarich-public
        - name: watched
          persistentVolumeClaim:
            claimName: dawarich-watched
      containers:
        - name: dawarich-sidekiq
          image: freikin/dawarich:0.16.4
          imagePullPolicy: Always
          command:
            - sidekiq-entrypoint.sh
          args:
            - bundle exec sidekiq
          env:
            - name: RAILS_ENV
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: RAILS_ENV
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: REDIS_URL
            - name: RAILS_SECRET_KEY_BASE
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: RAILS_SECRET_KEY_BASE
            - name: APPLICATION_HOST
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: APPLICATION_HOST
            - name: TIME_ZONE
              valueFrom:
                configMapKeyRef:
                  name: dawarich-config
                  key: TIME_ZONE
          volumeMounts:
            - name: public
              mountPath: /var/app/public
            - name: watched
              mountPath: /var/app/tmp/imports/watched
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1500m
              memory: 3Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
