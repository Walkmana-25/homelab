apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.38.0 (a8f5d1cbd)
  labels:
    io.kompose.service: dawarich-db
  name: dawarich-db
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: dawarich-db
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert
        kompose.version: 1.38.0 (a8f5d1cbd)
      labels:
        io.kompose.service: dawarich-db
    spec:
      containers:
        - env:
            - name: POSTGRES_DB
              value: dawarich_development
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_USER
              value: postgres
          image: postgis/postgis:17-3.5-alpine
          livenessProbe:
            exec:
              command:
                - pg_isready -U postgres -d dawarich_development
            failureThreshold: 5
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
          name: dawarich-db
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: dawarich-db-data
            - mountPath: /var/shared
              name: dawarich-shared
      restartPolicy: Always
      volumes:
        - name: dawarich-db-data
          persistentVolumeClaim:
            claimName: dawarich-db-data
        - name: dawarich-shared
          persistentVolumeClaim:
            claimName: dawarich-shared
