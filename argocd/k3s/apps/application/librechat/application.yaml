---
# LibreChat - Self-hosted AI chat platform
# https://www.librechat.ai/
# https://github.com/danny-avila/LibreChat
#
# Lightweight configuration:
#   - MongoDB (embedded Bitnami subchart)
#   - Meilisearch (embedded subchart, for search)
#   - Redis: disabled (not required for basic usage)
#   - RAG API: disabled (not available in OCI chart)
#   - Ingress: cloudflare-tunnel
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: librechat
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Walkmana-25/homelab.git
    targetRevision: HEAD
    path: argocd/k3s/apps/application/librechat
  destination:
    server: https://kubernetes.default.svc
    namespace: librechat
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
---
# LibreChat Helm release - points to the official OCI chart
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: librechat-helm
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: application
  annotations:
    # Deploy after credentials are created
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: librechat
    repoURL: ghcr.io/danny-avila/librechat-chart
    targetRevision: 2.0.2
    helm:
      values: |
        replicaCount: 1

        image:
          registry: registry.librechat.ai
          repository: danny-avila/librechat
          pullPolicy: IfNotPresent

        # ── Global credentials secret ──────────────────────────
        global:
          librechat:
            existingSecretName: librechat-credentials-env

        # ── LibreChat config ───────────────────────────────────
        librechat:
          existingSecretName: librechat-credentials-env
          configEnv:
            # General
            ALLOW_EMAIL_LOGIN: "true"
            ALLOW_REGISTRATION: "false"
            DOMAIN_CLIENT: "https://chat.lapis-dev.work"
            DOMAIN_SERVER: "https://chat.lapis-dev.work"
            # Search (Meilisearch)
            SEARCH: "true"
            MEILI_HOST: "librechat-meilisearch"
            MEILI_PORT: "7700"
            # Email (optional - uncomment to enable)
            # EMAIL_SERVICE: "gmail"
            # EMAIL_USERNAME: "your-email@gmail.com"
            # EMAIL_PASSWORD: "your-app-password"
            # EMAIL_FROM: "LibreChat <your-email@gmail.com>"
          configYamlContent: |
            version: 1.0.8
            cache: true
            interface:
              privacyPolicy:
                externalUrl: "https://librechat.ai/privacy-policy"
                openNewTab: true
              termsOfService:
                externalUrl: "https://librechat.ai/tos"
                openNewTab: true
            endpoints:
              custom:
                - name: 'z.ai'
                  apiKey: '${ZAI_API_KEY}'
                  baseURL: 'https://api.z.ai/api/coding/paas/v4'
                  models:
                    default:
                      - 'glm-5.1'
                      - 'glm-5'
                      - 'glm-5-turbo'
                      - 'glm-4.7'
                      - 'glm-4.6v'
                      - 'glm-4.5-air'
                    fetch: true
                  titleConvo: true
                  titleModel: 'glm-4.5-air'
                  modelDisplayLabel: 'z.ai'
                - name: 'INIAD OpenAI'
                  apiKey: '${INIAD_API_KEY}'
                  baseURL: '${INIAD_BASE_URL}'
                  models:
                    default: ["gpt-5.4-mini"]
                    fetch: true
                  titleConvo: true
                  titleModel: 'current_model'
                  modelDisplayLabel: 'INIAD OpenAI'
                - name: 'INIAD Claude'
                  apiKey: '${INIAD_API_KEY}'
                  baseURL: '${INIAD_CLAUDE_URL}'
                  models:
                    default: ["claude-sonnet-4-6"]
                    fetch: true
                  titleConvo: true
                  titleModel: 'current_model'
                  modelDisplayLabel: 'INIAD Claude'

        # ── RAG API ────────────────────────────────────────────
        librechat-rag-api:
          enabled: false

        # ── Ingress ────────────────────────────────────────────
        ingress:
          enabled: true
          className: cloudflare-tunnel
          hosts:
            - host: chat.lapis-dev.work
              paths:
                - path: /
                  pathType: Prefix

        # ── Resources ──────────────────────────────────────────
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

        # ── Service ────────────────────────────────────────────
        service:
          type: ClusterIP
          port: 3080
          targetPort: 3080

        # ── Image volume (user uploads) ────────────────────────
        imageVolume:
          enabled: true
          size: 5Gi
          accessModes:
            - ReadWriteOnce

        # ── MongoDB (Bitnami subchart) ─────────────────────────
        # Bitnami moved images from docker.io/bitnami to docker.io/bitnamilegacy
        # https://github.com/bitnami/charts/issues/35164
        mongodb:
          enabled: true
          image:
            registry: docker.io
            repository: bitnamilegacy/mongodb
          auth:
            enabled: false
          architecture: standalone
          persistence:
            enabled: true
            size: 5Gi
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

        # ── Meilisearch (subchart) ─────────────────────────────
        meilisearch:
          enabled: true
          persistence:
            enabled: true
            size: 1Gi
          auth:
            existingMasterKeySecret: librechat-credentials-env
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

        # ── Redis (disabled for lightweight) ────────────────────
        redis:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: librechat
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
