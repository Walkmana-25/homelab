---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-proxy
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: application
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Walkmana-25/homelab.git
    targetRevision: HEAD
    path: k8s/apps/mcp-proxy
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-proxy
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
