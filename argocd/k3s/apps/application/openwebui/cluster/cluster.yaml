---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: openwebui-postgres
  namespace: openwebui
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: application
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-minimal-trixie

  primaryUpdateStrategy: unsupervised

  bootstrap:
    initdb:
      database: openwebui
      owner: openwebui
      secret:
        name: openwebui-postgres-auth
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS vector;
        - CREATE EXTENSION IF NOT EXISTS pgvector;

  postgresql:
    extensions:
      - name: pgvector
        image:
          reference: ghcr.io/cloudnative-pg/pgvector-extension:0.8.0-18-trixie
        ld_library_path:
          - system

  storage:
    size: 5Gi
    storageClass: longhorn

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
