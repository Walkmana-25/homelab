---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  loki-dashboard.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "Loki",
          "description": "Total log entries received by Loki",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "axisLabel": "",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                },
                "lineInterpolation": "linear",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": {
                  "type": "linear"
                },
                "showPoints": "never",
                "spanNulls": true
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {
            "legend": {
              "calcs": [],
              "displayMode": "list",
              "placement": "bottom"
            },
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "datasource": "Loki",
              "expr": "sum(count_over_time({}[1m]))",
              "refId": "A"
            }
          ],
          "title": "Log Entries (1m rate)",
          "type": "timeseries"
        },
        {
          "datasource": "Loki",
          "description": "Log entries by namespace",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "hideFrom": {
                  "tooltip": false,
                  "viz": false,
                  "legend": false
                }
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "id": 2,
          "options": {
            "legend": {
              "displayMode": "table",
              "placement": "right"
            },
            "pieType": "pie",
            "tooltip": {
              "mode": "single"
            }
          },
          "targets": [
            {
              "datasource": "Loki",
              "expr": "sum by (namespace) (count_over_time({}[1m]))",
              "refId": "A"
            }
          ],
          "title": "Log Entries by Namespace",
          "type": "piechart"
        },
        {
          "datasource": "Loki",
          "description": "Log entries by log level",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "index": 0,
                      "text": "ERROR"
                    },
                    "1": {
                      "color": "orange",
                      "index": 1,
                      "text": "WARN"
                    },
                    "2": {
                      "color": "yellow",
                      "index": 2,
                      "text": "INFO"
                    },
                    "3": {
                      "color": "blue",
                      "index": 3,
                      "text": "DEBUG"
                    }
                  },
                  "type": "value"
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  }
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto"
          },
          "pluginVersion": "8.0.0",
          "targets": [
            {
              "datasource": "Loki",
              "expr": "sum(count_over_time({}|~ `(?i)error`[1m]))",
              "legendFormat": "ERROR",
              "refId": "A"
            },
            {
              "datasource": "Loki",
              "expr": "sum(count_over_time({}|~ `(?i)warn`[1m])) - sum(count_over_time({}|~ `(?i)error`[1m]))",
              "legendFormat": "WARN",
              "refId": "B"
            },
            {
              "datasource": "Loki",
              "expr": "sum(count_over_time({}|~ `(?i)info`[1m])) - sum(count_over_time({}|~ `(?i)warn`[1m]))",
              "legendFormat": "INFO",
              "refId": "C"
            },
            {
              "datasource": "Loki",
              "expr": "sum(count_over_time({}|~ `(?i)debug`[1m]))",
              "legendFormat": "DEBUG",
              "refId": "D"
            }
          ],
          "title": "Log Levels (1m)",
          "type": "stat"
        },
        {
          "datasource": "Loki",
          "description": "Top containers by log volume",
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "palette-classic"
              },
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "Value"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 150
                  }
                ]
              }
            ]
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          },
          "id": 4,
          "options": {
            "showHeader": true
          },
          "targets": [
            {
              "datasource": "Loki",
              "expr": "topk(10, sum by (container, namespace) (count_over_time({}[1m])))",
              "refId": "A"
            }
          ],
          "title": "Top Containers by Log Volume (1m)",
          "type": "table"
        },
        {
          "datasource": "Loki",
          "description": "Recent log entries",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              }
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 16
          },
          "id": 5,
          "options": {
            "deduplication": {
              "mode": "exact"
            },
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": "Loki",
              "expr": "{}",
              "refId": "A"
            }
          ],
          "title": "Recent Logs",
          "type": "logs"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 27,
      "style": "dark",
      "tags": [
        "loki",
        "logs"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "",
      "title": "Loki Logs",
      "uid": "loki-logs",
      "version": 1
    }
