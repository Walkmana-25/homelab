---
#  kubectl get secret headlamp-admin-token -n headlamp -o jsonpath='{.data.token}' | base64 -d
#  token取得コマンド
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: infrastructure
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    chart: headlamp
    targetRevision: 0.41.0
    helm:
      values: |
        service:
          type: ClusterIP
        ingress:
          enabled: true
          ingressClassName: cloudflare-tunnel
          hosts:
            - host: headlamp-k8s.lapis-dev.work
              paths:
                - path: /
                  type: Prefix
        extraManifests:
          - |
            apiVersion: v1
            kind: ServiceAccount
            metadata:
              name: headlamp-admin
              namespace: headlamp
          - |
            apiVersion: rbac.authorization.k8s.io/v1
            kind: ClusterRoleBinding
            metadata:
              name: headlamp-admin
            roleRef:
              apiGroup: rbac.authorization.k8s.io
              kind: ClusterRole
              name: cluster-admin
            subjects:
              - kind: ServiceAccount
                name: headlamp-admin
                namespace: headlamp
          - |
            apiVersion: v1
            kind: Secret
            metadata:
              name: headlamp-admin-token
              namespace: headlamp
              annotations:
                kubernetes.io/service-account.name: headlamp-admin
            type: kubernetes.io/service-account-token
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
