apiVersion: v1
kind: ConfigMap
metadata:
  name: firecrawl-config
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: firecrawl
data:
  HOST: "0.0.0.0"
  REDIS_URL: "redis://redis:6379"
  REDIS_RATE_LIMIT_URL: "redis://redis:6379"
  PLAYWRIGHT_MICROSERVICE_URL: "http://playwright-service:3000"
  USE_DB_AUTHENTICATION: "false"
  SENTRY_ENVIRONMENT: "production"
  ENV: "production"
  LOGGING_LEVEL: "DEBUG"
  IS_KUBERNETES: "true"
  NUQ_DATABASE_URL: "postgresql://postgres:password@nuq-postgres:5432/postgres"
  # Custom OpenAI-compatible API endpoint (e.g. Azure OpenAI, local proxy, etc.)
  # OPENAI_BASE_URL: "https://your-custom-endpoint/v1"
  # MODEL_NAME: "your-custom-model-name"
  # MODEL_EMBEDDING_NAME: "your-custom-embedding-model"
