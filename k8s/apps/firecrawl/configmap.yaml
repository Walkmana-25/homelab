apiVersion: v1
kind: ConfigMap
metadata:
  name: firecrawl-config
  labels:
    app.kubernetes.io/managed-by: argocd
    app.kubernetes.io/part-of: firecrawl
data:
  HOST: "0.0.0.0"
  PLAYWRIGHT_MICROSERVICE_URL: "http://playwright-service:3000"
  USE_DB_AUTHENTICATION: "false"
  SENTRY_ENVIRONMENT: "production"
  ENV: "production"
  LOGGING_LEVEL: "DEBUG"
  IS_KUBERNETES: "true"
  NUQ_DATABASE_URL: "postgresql://postgres:password@nuq-postgres:5432/postgres"
  # Google AI Studio (Gemini) - OpenAI-compatible endpoint
  OPENAI_BASE_URL: "https://generativelanguage.googleapis.com/v1beta/openai/"
  MODEL_NAME: "gemini-3-flash-preview"
  MODEL_EMBEDDING_NAME: "gemini-embedding-2-preview"
