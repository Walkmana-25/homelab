apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-proxy-config
  labels:
    app.kubernetes.io/name: mcp-proxy
data:
  config.json: |
    {
      "mcpProxy": {
        "baseURL": "https://mcp.lapis-dev.work",
        "addr": ":9090",
        "name": "Lapis's MCP",
        "version": "1.0.0",
        "type": "streamable-http"
      },
      "mcpServers": {
        "mcpu": {
          "command": "npx",
          "args": ["--package=@mcpu/cli", "mcpu-mcp", "--config", "/mcpu-config/config.json"],
          "env": {
            "HOME": "/tmp/mcpu"
          }
        }
      }
    }
