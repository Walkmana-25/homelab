apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-proxy-config
  labels:
    app.kubernetes.io/name: mcp-proxy
data:
  proxy.py: |
    from fastmcp import FastMCP
    from fastmcp.server import create_proxy
    from starlette.responses import JSONResponse


    import os

    # --- MCP upstream servers configuration ---
    MCP_SERVERS = {
        "deepwiki": {
            "url": "https://mcp.deepwiki.com/mcp",
            "exclude_tools": [],
        },
        "searxng": {
            "url": "http://searxng-mcp.mcp-proxy.svc.cluster.local:3000/mcp",
            "exclude_tools": [
                "web_url_read"
            ],
        },
        "firecrawl": {
            "url": "http://firecrawl-mcp.firecrawl.svc.cluster.local:8080/v2/mcp",
            "exclude_tools": [
                "firecrawl_agent",
                "firecrawl_agent_status",
                "firecrawl_browser_create",
                "firecrawl_browser_delete",
                "firecrawl_browser_execute",
                "firecrawl_browser_list",
            ],
        },
        "context7": {
            "url": "https://mcp.context7.com/mcp",
            "headers": {
                "CONTEXT7_API_KEY": os.environ.get("CONTEXT7_API_KEY", ""),
            },
            "exclude_tools": [],
        },
    }


    # --- Build the aggregated proxy server ---
    mcp = FastMCP("mcp-proxy")

    for name, server_config in MCP_SERVERS.items():
        headers = server_config.get("headers")
        proxy = create_proxy(server_config["url"], name=name, headers=headers)
        exclude = server_config.get("exclude_tools", [])
        if exclude:
            proxy.disable(names=set(exclude))
        mcp.mount(proxy)


    # --- Create ASGI app ---
    app = mcp.http_app(
        transport="streamable-http",
        path="/mcp",
    )

    async def health(request):
        return JSONResponse({"status": "ok"})

    app.add_route("/health", health, methods=["GET"])


    if __name__ == "__main__":
        import uvicorn
        uvicorn.run(app, host="0.0.0.0", port=9090)
