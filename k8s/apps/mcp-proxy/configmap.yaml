apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-proxy-config
  labels:
    app.kubernetes.io/name: mcp-proxy
data:
  # Sample
  config.json: |
    {
      "mcpProxy": {
        "baseURL": "https://mcp.lapis-dev.work",
        "addr": ":9090",
        "name": "Lapis's MCP",
        "version": "1.0.0"
        "type": "streamable-http"
      },
      "mcpServers": {
        "deepwiki": {
          "url": "https://mcp.deepwiki.com/mcp",
          "transportType": "streamable-http"
        },
        "searxng": {
          "url": "http://searxng-mcp.mcp-proxy.svc.cluster.local:3000/mcp",
          "transportType": "streamable-http"
        }
      }
    }
