apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-proxy
  labels:
    app.kubernetes.io/name: mcp-proxy
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-proxy
    spec:
      volumes:
        - name: config
          configMap:
            name: mcp-proxy-config
        - name: mcpu-config
          configMap:
            name: mcpu-config
        - name: nginx-config
          configMap:
            name: mcp-proxy-nginx
      containers:
        - name: nginx
          image: nginx:alpine
          env:
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-proxy-auth-token
                  key: token
            - name: MCP_AUTH_TOKEN_2
              valueFrom:
                secretKeyRef:
                  name: mcp-proxy-auth-token
                  key: token2
          command:
            - /bin/sh
            - -c
            - |
              envsubst '$MCP_AUTH_TOKEN $MCP_AUTH_TOKEN_2' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
              exec nginx -g 'daemon off;'
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        - name: mcp-proxy
          image: ghcr.io/tbxark/mcp-proxy:v0.43.2
          ports:
            - containerPort: 9090
              name: proxy
          volumeMounts:
            - name: config
              mountPath: /config/config.json
              subPath: config.json
            - name: mcpu-config
              mountPath: /mcpu-config/config.json
              subPath: config.json
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
