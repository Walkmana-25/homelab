apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-proxy
  labels:
    app.kubernetes.io/name: mcp-proxy
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-proxy
    spec:
      volumes:
        - name: config
          configMap:
            name: mcp-proxy-config
        - name: nginx-config
          configMap:
            name: mcp-proxy-nginx
      containers:
        - name: nginx
          image: nginx:alpine
          env:
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mcp-proxy-auth-token
                  key: token
            - name: MCP_AUTH_TOKEN_2
              valueFrom:
                secretKeyRef:
                  name: mcp-proxy-auth-token
                  key: token2
          command:
            - /bin/sh
            - -c
            - |
              envsubst '$MCP_AUTH_TOKEN $MCP_AUTH_TOKEN_2' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
              exec nginx -g 'daemon off;'
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        - name: mcp-proxy
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install --no-cache-dir "fastmcp[server]" httpx && \
              python /app/proxy.py
          ports:
            - containerPort: 9090
              name: proxy
          volumeMounts:
            - name: config
              mountPath: /app/proxy.py
              subPath: proxy.py
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            failureThreshold: 3
