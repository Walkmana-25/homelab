apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-proxy
  labels:
    app.kubernetes.io/name: mcp-proxy
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: mcp.lapis-dev.work
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-proxy
                port:
                  number: 9090
