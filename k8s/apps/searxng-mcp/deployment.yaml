apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng-mcp
  labels:
    app.kubernetes.io/name: searxng-mcp
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng-mcp
    spec:
      containers:
        - name: searxng-mcp
          image: isokoliuk/mcp-searxng:latest
          env:
            - name: SEARXNG_URL
              value: http://searxng.searxng.svc.cluster.local:8080
            - name: MCP_HTTP_PORT
              value: "3000"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
